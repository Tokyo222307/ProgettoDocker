<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quiz Informatico — Accesso</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <div class="card">
        <div class="badge">Regolamento</div>
        <h1>Pronto a<br>metterti alla prova?</h1>

        <ul class="rules">
            <li><span>10</span> domande casuali</li>
            <li><span>15s</span> per domanda</li>
            <li><span>+1</span> per risposta corretta</li>
            <li><span>0</span> penalità per errore</li>
        </ul>

        <div id="alertMsg" class="alert-msg"></div>

        <div class="field">
            <label for="nome">Il tuo nome</label>
            <input type="text" id="nome" name="nome" placeholder="Es. Mario Rossi" autocomplete="off">
        </div>

        <div class="home-actions">
            <button class="btn-primary" onclick="cominciaDomande()">▶ Inizia</button>
            <button class="btn-secondary" onclick="ritornaHome()">← Torna alla home</button>
        </div>
    </div>
</body>
</html>
