<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quiz Informatico — 5ª Superiore</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <div class="card">
        <div class="badge">Quiz Informatico</div>
        <h1>Ripassa per<br>l'esame 🖥️</h1>
        <h2>Reti, Sistemi, Database, Programmazione e Sicurezza</h2>

        <div class="stats-row">
            <div class="stat-box">
                <div class="num">40+</div>
                <div class="lbl">Domande</div>
            </div>
            <div class="stat-box">
                <div class="num">15s</div>
                <div class="lbl">Per domanda</div>
            </div>
            <div class="stat-box">
                <div class="num">5</div>
                <div class="lbl">Argomenti</div>
            </div>
        </div>

        <div class="home-actions">
            <button class="btn-primary" onclick="startButton()">▶ Inizia il quiz</button>
            <button class="btn-secondary" onclick="visualizzaClassifica()">🏆 Classifica</button>
        </div>
    </div>
</body>
</html>
