version: "3.8"

services:
  php:
      build: ./php
      container_name: quiz-backend
      ports:
        - "8080:80"
      volumes:
        - ./php:/var/www/html
      depends_on:
        - mysql
      restart: always
  nginx:
    image: nginx:latest
    container_name: quiz
    ports:
      - "8081:80"
    volumes:
      - ./website:/usr/share/nginx/html
    restart: always
  mysql:
    image: mysql:8.0
    container_name: quiz-mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: quizinformatico

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
volumes:
  mysql_data: